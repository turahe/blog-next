name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Add repository secret SNYK_TOKEN (snyk.io → Account settings → Auth token) for the Snyk step.
# Use checkout/setup-node v6 so the actions run on Node 24 (GitHub deprecation of Node 20 action runtimes).
#
# Vercel deploy jobs need secret VERCEL_TOKEN only; commit .vercel/project.json after `vercel link`.
# https://vercel.com/guides/how-can-i-use-github-actions-with-vercel
# If you also use Vercel’s GitHub app for the same repo, disable one to avoid duplicate deployments.

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Snyk Open Source (dependency scan)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e

  deploy-preview:
    name: Deploy preview (Vercel)
    needs: ci
    if: >
      success() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require .vercel/project.json
        run: test -f .vercel/project.json || (echo 'Add .vercel/project.json: run npx vercel link, then commit .vercel/project.json' && exit 1)

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview to Vercel
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy-production:
    name: Deploy production (Vercel)
    needs: ci
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require .vercel/project.json
        run: test -f .vercel/project.json || (echo 'Add .vercel/project.json: run npx vercel link, then commit .vercel/project.json' && exit 1)

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
